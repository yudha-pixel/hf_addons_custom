<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bgGradient)"/>
  
  <!-- Truck body -->
  <g transform="translate(40, 80)">
    <!-- Main cargo area -->
    <rect x="20" y="30" width="100" height="60" rx="8" fill="url(#truckGradient)" stroke="#333" stroke-width="3"/>
    
    <!-- Cab -->
    <path d="M 120 40 L 150 40 L 160 60 L 160 90 L 120 90 Z" fill="url(#truckGradient)" stroke="#333" stroke-width="3"/>
    
    <!-- Cab window -->
    <path d="M 130 45 L 150 45 L 155 60 L 130 60 Z" fill="#4a90e2" stroke="#333" stroke-width="2"/>
    
    <!-- Wheels -->
    <circle cx="50" cy="95" r="15" fill="#333" stroke="#555" stroke-width="2"/>
    <circle cx="50" cy="95" r="8" fill="#666"/>
    
    <circle cx="140" cy="95" r="15" fill="#333" stroke="#555" stroke-width="2"/>
    <circle cx="140" cy="95" r="8" fill="#666"/>
    
    <!-- Money symbol on cargo -->
    <text x="70" y="70" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#667eea" text-anchor="middle">₦</text>
  </g>
  
  <!-- Deposit icon (coins) -->
  <g transform="translate(150, 140)">
    <!-- Coin 1 -->
    <circle cx="0" cy="0" r="20" fill="#ffd700" stroke="#333" stroke-width="2"/>
    <text x="0" y="7" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">₦</text>
    
    <!-- Coin 2 (behind) -->
    <circle cx="20" cy="-10" r="20" fill="#ffed4e" stroke="#333" stroke-width="2"/>
    <text x="20" y="-3" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">₦</text>
    
    <!-- Coin 3 (front) -->
    <circle cx="10" cy="15" r="20" fill="#ffc107" stroke="#333" stroke-width="2"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">₦</text>
  </g>
  
  <!-- Module name badge -->
  <rect x="20" y="200" width="216" height="36" rx="18" fill="#ffffff" opacity="0.95"/>
  <text x="128" y="223" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">FOTS DEPOSITS</text>
</svg>
